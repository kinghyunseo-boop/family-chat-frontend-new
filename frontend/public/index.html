<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1E2A38" />
    <meta name="description" content="가족 전용 비공개 메신저" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="우리가족톡" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Apple splash screens -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <title>우리가족톡</title>
    <style>
      /* Splash screen */
      #splash {
        position: fixed;
        inset: 0;
        background: #1E2A38;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-icon {
        width: 96px;
        height: 96px;
        background: #FEE500;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash-title {
        color: white;
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      #splash-sub {
        color: rgba(255,255,255,0.5);
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 13px;
        margin-top: 8px;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; overflow: hidden; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-icon">💬</div>
      <div id="splash-title">우리가족톡</div>
      <div id="splash-sub">가족만을 위한 비공개 채팅</div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1200);
      });
    </script>
  </body>
</html>
