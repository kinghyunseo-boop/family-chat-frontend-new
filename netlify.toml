# Netlify 배포 설정
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "build"

# 🔥 [중요] 백엔드 프록시 규칙을 무조건 첫 번째 리다이렉트로 올려야 합니다!
[[redirects]]
  from   = "/api/*"
  to     = "https://family-chat-backend-j00g.onrender.com/api/:splat"
  status = 200
  force  = true

# 🔄 리액트 라우터 SPA 규칙은 가장 마지막에 위치해야 합니다.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Service Worker 캐시 비활성화 (업데이트 즉시 반영)
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
