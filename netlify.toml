# Netlify 배포 설정
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "build"

# React Router SPA를 위한 리다이렉트
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API 요청을 Render 백엔드로 프록시
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_BACKEND.onrender.com/api/:splat"
  status = 200
  force  = true

# 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Service Worker 캐시 비활성화 (업데이트 즉시 반영)
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
